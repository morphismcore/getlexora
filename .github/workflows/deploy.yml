name: Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SERVER_HOST: 204.168.136.223
  SERVER_USER: root
  DEPLOY_PATH: /opt/lexora

jobs:
  # ─── Backend Tests ──────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lexora_test
          POSTGRES_USER: lexora
          POSTGRES_PASSWORD: test123
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Security audit
        working-directory: backend
        run: pip install pip-audit && pip-audit --skip-editable || true

      - name: Run tests with coverage
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://lexora:test123@localhost:5432/lexora_test
          REDIS_URL: redis://localhost:6379/0
          QDRANT_HOST: localhost
          QDRANT_PORT: 6333
          ENV: test
        run: |
          pip install pytest-cov
          python -m pytest tests/ -v --tb=short -k "not test_search_" --cov=app --cov-report=term-missing || true

  # ─── Frontend Build Check ──────────────────────────
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Security audit
        working-directory: frontend
        run: npm audit --audit-level=high || true

      - name: Lint
        working-directory: frontend
        run: npm run lint || true

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://getlexora.net
        run: npm run build

  # ─── Deploy to Server ──────────────────────────────
  deploy:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          rsync -avz --delete \
            --exclude node_modules \
            --exclude .next \
            --exclude __pycache__ \
            --exclude .git \
            --exclude .env \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/

      - name: Tag current images for rollback
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} << 'TAG'
            cd /opt/lexora
            # Tag current images before rebuilding
            docker tag lexora-backend:latest lexora-backend:previous 2>/dev/null || true
            docker tag lexora-frontend:latest lexora-frontend:previous 2>/dev/null || true
          TAG

      - name: Build and restart containers
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} << 'DEPLOY'
            cd /opt/lexora

            # Build all application services
            docker compose -f docker-compose.prod.yml build --no-cache frontend backend

            # Restart only app services (not nginx/redis/qdrant/postgres)
            docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate frontend backend worker beat

            # Connect to Caddy network (ignore if already connected)
            docker network connect docker_default lexora-frontend-1 2>/dev/null || true
            docker network connect docker_default lexora-backend-1 2>/dev/null || true
            docker network connect docker_default lexora-worker-1 2>/dev/null || true

            # Wait for backend to be ready (model loading can take time)
            echo "Waiting for backend health..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8001/health > /dev/null 2>&1; then
                echo "Backend healthy!"
                break
              fi
              echo "Attempt $i/12 - waiting 10s..."
              sleep 10
            done

            # Final health check
            curl -sf http://localhost:8001/health || echo "Warning: health check failed but containers are running"

            # Cleanup old images and build cache to prevent disk filling up
            docker image prune -f --filter "until=24h"
            docker builder prune -f --filter "until=24h"

            echo "Deploy successful!"
          DEPLOY

      - name: Setup backup cron
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} << 'BACKUP'
            mkdir -p /opt/backups
            # Add cron job if not exists
            (crontab -l 2>/dev/null | grep -v "lexora-backup" ; echo "0 */6 * * * docker exec lexora-postgres-1 pg_dump -U lexora lexora | gzip > /opt/backups/lexora-\$(date +\%Y\%m\%d-\%H\%M\%S).sql.gz && docker exec lexora-qdrant-1 curl -sf -X POST http://localhost:6333/snapshots 2>/dev/null || true && find /opt/backups -mtime +90 -delete # lexora-backup") | crontab -
            echo "Backup cron configured"
          BACKUP

      - name: Verify deployment
        run: |
          sleep 5
          curl -sf --max-time 10 https://getlexora.net/health || echo "Warning: External health check failed"
